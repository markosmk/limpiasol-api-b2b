# `npx drizzle-kit push:mysql` → crea tablas.
# `npx drizzle-kit generate:mysql && npx drizzle-kit migrate` → producción.
services:

  lsol-redis:
    image: redis:latest
    container_name: redis-container-lsol
    ports:
      - "6379:6379"
    volumes:
      - redis_data_lsol:/data

  lsol-postgres:
    image: postgres:18
    container_name: postgres-container-lsol
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: ecommerce_limpiasol_pg
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_lsol:/var/lib/postgresql

  lsol-postgres-test:
    image: postgres:18
    container_name: postgres-container-lsol-test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: ecommerce_limpiasol_test
    ports:
      - "5434:5432"
    volumes:
      - postgres_data_lsol_test:/var/lib/postgresql

volumes:
  redis_data_lsol:
  postgres_data_lsol:
  postgres_data_lsol_test:
