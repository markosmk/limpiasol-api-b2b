        - cookieAuth: []
      summary: Listar mis pedidos
      tags:
        - Orders
    post:
      description: Registra una nueva solicitud de pedido en el sistema. Valida stock
        y calcula el total transaccionalmente.
      operationId: createOrder
      requestBody:
        content:
          application/json:
            schema:
              properties:
                billingData:
                  $ref: '#/components/schemas/Address'
                deliveryType:
                  $ref: '#/components/schemas/DeliveryType'
                observations:
                  type: string
                pickupLocationData:
                  type: object
                shippingData:
                  $ref: '#/components/schemas/Address'
              required:
                - deliveryType
              type: object
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                properties:
                  data:
                    properties:
                      orderCode:
                        type: string
                      orderId:
                        type: string
                      total:
                        type: string
                    type: object
                  success:
                    type: boolean
                type: object
          description: Pedido creado con éxito.
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/401Unauthorized'
      security:
        - cookieAuth: []
      summary: Crear nuevo pedido
      tags:
        - Orders
