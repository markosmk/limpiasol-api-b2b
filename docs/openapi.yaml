          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  message:
                    type: string
                  success:
                    type: boolean
                type: object
          description: Correo electrónico verificado exitosamente.
        '400':
          description: Token inválido o expirado.
      summary: Verificar correo electrónico
      tags:
        - Auth
  /carts:
    delete:
      description: Elimina todos los items del carrito actual del usuario.
