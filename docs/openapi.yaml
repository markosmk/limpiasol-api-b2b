        posterior (opcional depende config).
      operationId: register
      requestBody:
        content:
          application/json:
            schema:
              properties:
                email:
                  format: email
                  type: string
                password:
                  minLength: 8
                  type: string
              required:
                - email
                - password
              type: object
        required: true
      responses:
        '201':
          description: Registro exitoso. Se ha enviado un email de verificación.
        '400':
          $ref: '#/components/responses/401Unauthorized'
      summary: Registrar nuevo usuario
      tags:
        - Auth
  /auth/reset-password:
    post:
      description: Cambia la contraseña del usuario utilizando el token recibido por email.
      operationId: resetPassword
      requestBody:
        content:
          application/json:
            schema:
              properties:
                password:
                  description: Nueva contraseña segura.
                  minLength: 8
                  type: string
                token:
                  description: Token de recuperación recibido por email.
                  type: string
              required:
                - token
                - password
              type: object
        required: true
      responses:
        '200':
