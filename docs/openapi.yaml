components:
  responses:
    400BadRequest:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
      description: Error de validación en la solicitud.
    401Unauthorized:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
      description: No autenticado. Sesión expirada o inexistente.
    403Forbidden:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
      description: No autorizado. El usuario no tiene el rol necesario.
    404NotFound:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
      description: Recurso no encontrado.
    500InternalServerError:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
      description: Error interno del servidor.
    Error:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
      description: Error general de negocio o validación.
  schemas:
    Address:
      properties:
        addressLine1:
          example: Av. Siempre Viva 123
          type: string
        addressLine2:
          example: Depto 4B
          nullable: true
          type: string
        city:
          example: Ciudad Autónoma de Buenos Aires
          type: string
        fullName:
          example: Juan Perez
          type: string
        phone:
          example: '1122334455'
          type: string
        postalCode:
          example: '1425'
          pattern: ^\d{4}$
          type: string
        province:
          example: Buenos Aires
          type: string
      required:
        - fullName
        - addressLine1
        - city
        - province
        - postalCode
        - phone
      type: object
    AdminCreateProduct:
      properties:
        brandId:
          type: string
        categories:
          items:
            type: string
          type: array
        description:
          type: string
        name:
          type: string
        prices:
          items:
            properties:
              price:
                type: number
              sku:
                description: Opcional. Vincula el precio a una variante específica por SKU
                type: string
              tierType:
                enum:
                  - retail
                  - reseller
                type: string
            required:
              - tierType
              - price
            type: object
          type: array
        slug:
          type: string
        status:
          enum:
            - published
            - draft
            - inactive
          type: string
        tags:
          items:
            type: string
          type: array
        variants:
          items:
            properties:
              name:
                type: string
              options:
                type: object
              sku:
                type: string
              stock:
                type: integer
            required:
              - name
              - sku
            type: object
          type: array
      required:
        - name
        - slug
        - status
      type: object
    AdminUpdateProduct:
      properties:
        categories:
          items:
            type: string
          type: array
        description:
          type: string
        name:
          type: string
        prices:
          items:
            $ref: '#/components/schemas/PriceTier'
          type: array
        slug:
          type: string
        status:
          enum:
            - published
            - draft
            - inactive
          type: string
        tags:
          items:
            type: string
          type: array
        variants:
          items:
            properties:
              id:
                description: Si se omite, se crea como nueva variante
                type: string
              name:
                type: string
              sku:
                type: string
              stock:
                type: integer
            type: object
          type: array
      type: object
    Category:
      allOf:
        - $ref: '#/components/schemas/CategoryPublic'
        - properties:
            createdAt:
              format: date-time
              type: string
            description:
              nullable: true
              type: string
          type: object
    CategoryPublic:
      properties:
        id:
          type: string
        imageUrl:
          nullable: true
          type: string
        name:
          type: string
        parentId:
          nullable: true
          type: string
        slug:
          type: string
      type: object
    Collection:
      allOf:
        - $ref: '#/components/schemas/CollectionPublic'
        - properties:
            description:
              nullable: true
              type: string
            isActive:
              type: boolean
          type: object
    CollectionPublic:
      properties:
        id:
          type: string
        imageUrl:
          nullable: true
          type: string
        isFeatured:
          type: boolean
        name:
          type: string
        slug:
          type: string
      type: object
    DeliveryType:
      enum:
        - shipping
        - pickup
      type: string
    Error:
      properties:
        code:
          example: bad_request
          type: string
        issues:
          additionalProperties:
            items:
              type: string
            type: array
          description: Detalles de validación por campo si aplica.
          type: object
        message:
          example: Solicitud inválida
          type: string
        statusCode:
          example: 400
          type: integer
      required:
        - statusCode
        - code
        - message
      type: object
    Order:
      properties:
        createdAt:
          format: date-time
          type: string
        deliveryType:
          $ref: '#/components/schemas/DeliveryType'
        discounts:
          type: string
        id:
          type: string
        items:
          items:
            $ref: '#/components/schemas/OrderItem'
          type: array
        orderCode:
          type: string
        orderNumber:
          type: integer
        shippingAddress:
          $ref: '#/components/schemas/Address'
        shippingCost:
          type: string
        status:
          $ref: '#/components/schemas/OrderStatus'
        subtotal:
          type: string
        taxes:
          type: string
        total:
          type: string
        updatedAt:
          format: date-time
          type: string
      required:
        - id
        - orderCode
        - status
        - total
        - items
      type: object
    OrderItem:
      properties:
        id:
          type: string
        lineSubtotal:
          type: string
        productId:
          type: string
        productName:
          type: string
        productSku:
          type: string
        quantity:
          type: integer
        unitPrice:
          type: string
        variantId:
          nullable: true
          type: string
      required:
        - id
        - productName
        - unitPrice
        - quantity
        - lineSubtotal
      type: object
    OrderStatus:
      enum:
        - pending
        - adjusting
        - pending_payment
        - paid
        - shipped
        - ready_pickup
        - delivered
        - cancelled
      type: string
    PaginationParams:
      properties:
        limit:
          default: 20
          example: 20
          maximum: 100
          minimum: 1
          type: integer
        page:
          default: 1
          example: 1
          minimum: 1
          type: integer
      type: object
    PriceCalculationResult:
      properties:
        appliedTier:
          type: string
        discountApplied:
          type: boolean
        note:
          type: string
        total:
          type: string
        unitPrice:
          type: string
      type: object
    PriceTier:
      properties:
        compareAtPrice:
          nullable: true
          type: string
        minQuantity:
          type: integer
        price:
          type: string
        tierType:
          enum:
            - retail
            - reseller
          type: string
        volumeDiscounts:
          items:
            type: object
          type: array
      type: object
    Product:
      properties:
        description:
          type: string
        id:
          type: string
        name:
          type: string
        shortDescription:
          type: string
        sku:
          type: string
        slug:
          type: string
        status:
          enum:
            - published
            - draft
            - inactive
          type: string
        variants:
          items:
            $ref: '#/components/schemas/ProductVariant'
          type: array
      required:
        - id
        - name
        - slug
        - status
      type: object
    ProductVariant:
      properties:
        id:
          type: string
        name:
          type: string
        options:
          additionalProperties:
            type: string
          type: object
        sku:
          type: string
        stock:
          type: integer
      type: object
    Setting:
      properties:
        category:
          type: string
        key:
          type: string
        updatedAt:
          format: date-time
          type: string
        value:
          type: object
      type: object
    UpdateSettingInput:
      properties:
        category:
          type: string
        key:
          type: string
        value:
          type: object
      required:
        - key
        - value
      type: object
    User:
      properties:
        email:
          type: string
        id:
          type: string
        role:
          enum:
            - retail
            - reseller
            - admin
          type: string
        status:
          enum:
            - active
            - inactive
          type: string
      type: object
  securitySchemes:
    cookieAuth:
      description: Sesión de usuario almacenada en cookie httpOnly.
      in: cookie
      name: session
      type: apiKey
info:
  contact:
    email: soporte@limpiasol.com
    name: Soporte Limpiasol
    url: https://limpiasol.com
  description: API para gestión de pedidos B2B y catálogo mayorista.
  title: Limpiasol B2B API
  version: 1.0.0
openapi: 3.1.0
paths:
  /account/me:
    get:
      description: Devuelve la información completa del perfil del usuario autenticado.
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  email:
                    type: string
                  id:
                    type: string
                  name:
                    type: string
                  phone:
                    type: string
                  role:
                    type: string
                  status:
                    type: string
                type: object
          description: Perfil del usuario
        '401':
          $ref: '#/components/responses/401Unauthorized'
      security:
        - cookieAuth: []
      summary: Obtener perfil del usuario actual
      tags:
        - Account
    patch:
      description: Actualiza los datos del usuario actual (nombre, teléfono, etc.).
      requestBody:
        content:
          application/json:
            schema:
              properties:
                cuit:
                  type: string
                name:
                  type: string
                phone:
                  type: string
              type: object
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  success:
                    type: boolean
                type: object
          description: Perfil actualizado
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/401Unauthorized'
      security:
        - cookieAuth: []
      summary: Actualizar perfil
      tags:
        - Account
  /account/me/change-password:
    post:
      description: Actualiza la contraseña del usuario actual. Revoca la sesión
        actual, requiriendo iniciar sesión de nuevo.
      requestBody:
        content:
          application/json:
            schema:
              properties:
                confirmPassword:
                  type: string
                newPassword:
                  type: string
                oldPassword:
                  type: string
              required:
                - oldPassword
                - newPassword
                - confirmPassword
              type: object
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  message:
                    type: string
                  success:
                    type: boolean
                type: object
          description: Contraseña actualizada correctamente
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/401Unauthorized'
      security:
        - cookieAuth: []
      summary: Cambiar contraseña
      tags:
        - Account
  /account/me/sessions:
    delete:
      description: Cierra todas las sesiones activas del usuario, excepto la que está
        realizando la petición.
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  message:
                    type: string
                  success:
                    type: boolean
                type: object
          description: Sesiones cerradas
        '401':
          $ref: '#/components/responses/401Unauthorized'
      security:
        - cookieAuth: []
      summary: Cerrar otras sesiones
      tags:
        - Account
    get:
      description: Devuelve todas las sesiones activas del usuario, indicando cuál es
        la sesión actual.
      responses:
        '200':
          content:
            application/json:
              schema:
                items:
                  properties:
                    createdAt:
                      format: date-time
                      type: string
                    id:
                      type: string
                    ipAddress:
                      type: string
                    isCurrent:
                      type: boolean
                    userAgent:
                      type: string
                  type: object
                type: array
          description: Lista de sesiones
        '401':
          $ref: '#/components/responses/401Unauthorized'
      security:
        - cookieAuth: []
      summary: Listar sesiones activas
      tags:
        - Account
  /account/me/sessions/{id}:
    delete:
      description: Cierra una sesión específica por su ID. Si es la sesión actual,
        también limpia la cookie.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  message:
                    type: string
                  success:
                    type: boolean
                type: object
          description: Sesión terminada
        '401':
          $ref: '#/components/responses/401Unauthorized'
      security:
        - cookieAuth: []
      summary: Cerrar sesión específica
      tags:
        - Account
  /admin/modules:
    get:
      description: Retorna el estado (habilitado/deshabilitado) de todos los módulos
        integrables (Email, WhatsApp, etc.).
      operationId: adminGetModules
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  modules:
                    items:
                      properties:
                        enabled:
                          type: boolean
                        name:
                          type: string
                      type: object
                    type: array
                  success:
                    type: boolean
                type: object
          description: Lista de módulos.
      security:
        - cookieAuth: []
      summary: Listar módulos del sistema
      tags:
        - Admin - Settings
  /admin/modules/{name}:
    get:
      description: Retorna la configuración detallada de un módulo específico.
      operationId: adminGetModuleConfig
      parameters:
        - in: path
          name: name
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  config:
                    type: object
                  success:
                    type: boolean
                type: object
          description: Configuración del módulo.
        '404':
          description: Módulo no encontrado
      security:
        - cookieAuth: []
      summary: Obtener configuración de un módulo
      tags:
        - Admin - Settings
    patch:
      description: Habilita/deshabilita un módulo o actualiza su configuración interna
        (ej. API keys).
      operationId: adminUpdateModuleConfig
      parameters:
        - in: path
          name: name
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                config:
                  description: Valores específicos para el esquema del módulo
                  type: object
                enabled:
                  type: boolean
              required:
                - enabled
              type: object
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  data:
                    type: object
                  success:
                    type: boolean
                type: object
          description: Configuración actualizada.
      security:
        - cookieAuth: []
      summary: Actualizar configuración de módulo
      tags:
        - Admin - Settings
  /admin/orders:
    get:
      description: Retorna todos los pedidos de la tienda con filtros avanzados.
      operationId: adminGetOrders
      parameters:
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
        - in: query
          name: status
          schema:
            type: string
        - description: Buscar por código o número de orden.
          in: query
          name: search
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  data:
                    properties:
                      orders:
                        items:
                          $ref: '#/components/schemas/Order'
                        type: array
                      total:
                        type: integer
                    type: object
                  success:
                    type: boolean
                type: object
          description: Lista de pedidos.
      security:
        - cookieAuth: []
      summary: Listar todas las órdenes (Vista Admin)
      tags:
        - Admin - Orders
  /admin/orders/{id}:
    get:
      description: Retorna toda la información de una orden para gestión interna.
      operationId: adminGetOrderDetail
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  data:
                    $ref: '#/components/schemas/Order'
                  success:
                    type: boolean
                type: object
          description: OK.
      security:
        - cookieAuth: []
      summary: Detalle completo de orden (Vista Admin)
      tags:
        - Admin - Orders
  /admin/orders/{id}/delivery:
    patch:
      description: Permite cambiar entre envío a domicilio o retiro por local,
        actualizando los datos relacionados.
      operationId: adminChangeOrderDelivery
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                deliveryType:
                  $ref: '#/components/schemas/DeliveryType'
                pickupLocationData:
                  type: object
                shippingData:
                  type: object
              required:
                - deliveryType
              type: object
        required: true
      responses:
        '200':
          description: Método de entrega actualizado.
      security:
        - cookieAuth: []
      summary: Cambiar método de entrega
      tags:
        - Admin - Orders
  /admin/orders/{id}/items/add:
    patch:
      operationId: adminAddOrderItem
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                productId:
                  type: string
                quantity:
                  type: integer
                variantId:
                  type: string
              required:
                - productId
                - variantId
                - quantity
              type: object
        required: true
      responses:
        '200':
          description: Item agregado.
      security:
        - cookieAuth: []
      summary: Agregar producto a la orden
      tags:
        - Admin - Orders
  /admin/orders/{id}/items/{itemId}:
    delete:
      operationId: adminRemoveOrderItem
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: path
          name: itemId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Item removido.
      security:
        - cookieAuth: []
      summary: Remover item de la orden
      tags:
        - Admin - Orders
    patch:
      operationId: adminUpdateOrderItem
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: path
          name: itemId
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                quantity:
                  minimum: 1
                  type: integer
              required:
                - quantity
              type: object
        required: true
      responses:
        '200':
          description: Cantidad actualizada.
      security:
        - cookieAuth: []
      summary: Modificar cantidad de item
      tags:
        - Admin - Orders
  /admin/orders/{id}/notes:
    post:
      description: Añade un comentario o nota para uso exclusivo del staff.
      operationId: adminAddOrderNote
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                content:
                  type: string
                type:
                  enum:
                    - general
                    - urgent
                    - customer
                    - logistics
                  type: string
              required:
                - content
              type: object
        required: true
      responses:
        '200':
          description: Nota agregada.
      security:
        - cookieAuth: []
      summary: Agregar nota interna
      tags:
        - Admin - Orders
  /admin/orders/{id}/pricing:
    patch:
      description: Aplica recargos o descuentos manuales al total de la orden.
      operationId: adminApplyManualAdjustment
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                adjustment:
                  description: Valor numérico como string (ej. '-500' o '100')
                  type: string
                notifyCustomer:
                  type: boolean
                reason:
                  type: string
              required:
                - adjustment
                - reason
              type: object
        required: true
      responses:
        '200':
          description: Ajuste aplicado.
      security:
        - cookieAuth: []
      summary: Ajuste manual de precios
      tags:
        - Admin - Orders
  /admin/orders/{id}/status:
    patch:
      description: Actualiza el estado de una orden (ej. de pending a paid o shipped).
      operationId: adminUpdateOrderStatus
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                reason:
                  type: string
                status:
                  $ref: '#/components/schemas/OrderStatus'
              required:
                - status
              type: object
        required: true
      responses:
        '200':
          description: Estado actualizado.
      security:
        - cookieAuth: []
      summary: Cambiar estado de orden
      tags:
        - Admin - Orders
  /admin/settings:
    get:
      description: Retorna un listado de todas las configuraciones de la tienda.
        Opcionalmente filtrado por categoría.
      operationId: adminGetSettings
      parameters:
        - description: Filtrar configuraciones por categoría (ej. 'store',
            'notifications', 'checkout').
          in: query
          name: category
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/Setting'
                type: array
          description: Lista de configuraciones.
        '401':
          $ref: '#/components/responses/401Unauthorized'
      security:
        - cookieAuth: []
      summary: Obtener configuraciones globales
      tags:
        - Admin - Settings
    patch:
      description: Actualiza el valor de una clave de configuración específica.
      operationId: adminUpdateSetting
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSettingInput'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  message:
                    type: string
                  success:
                    type: boolean
                type: object
          description: Configuración actualizada.
      security:
        - cookieAuth: []
      summary: Actualizar una configuración
      tags:
        - Admin - Settings
  /auth/forgot-password:
    post:
      description: Envía un email con un token temporal para restablecer la contraseña
        si la cuenta existe.
      operationId: forgotPassword
      requestBody:
        content:
          application/json:
            schema:
              properties:
                email:
                  format: email
                  type: string
              required:
                - email
              type: object
        required: true
      responses:
        '200':
          description: Instrucciones enviadas si el email está registrado.
      summary: Solicitar recuperación de contraseña
      tags:
        - Auth
  /auth/login:
    post:
      description: Autentica al usuario con sus credenciales y crea una sesión segura
        almacenada en una cookie httpOnly.
      operationId: login
      requestBody:
        content:
          application/json:
            schema:
              properties:
                email:
                  example: admin@limpiasol.com
                  format: email
                  type: string
                password:
                  example: password123
                  type: string
              required:
                - email
                - password
              type: object
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  success:
                    type: boolean
                  user:
                    $ref: '#/components/schemas/User'
                type: object
          description: Inicio de sesión exitoso.
          headers:
            Set-Cookie:
              description: Token de sesión en cookie httpOnly llamado 'session'.
              schema:
                type: string
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Credenciales inválidas o error de validación.
      summary: Iniciar sesión
      tags:
        - Auth
  /auth/logout:
    post:
      description: Invalida la sesión actual del usuario y elimina la cookie del navegador.
      operationId: logout
