                          properties:
                            appliedTier:
                              type: string
                            finalSubtotal:
                              type: number
                            unitPrice:
                              type: number
                          type: object
                        productId:
                          type: string
                        quantity:
                          type: number
                        variantId:
                          type: string
                      type: object
                    type: array
                  status:
                    type: string
                  subtotal:
                    type: number
                  userId:
                    type: string
                type: object
          description: Carrito hidratado con precios y productos
        '401':
          $ref: '#/components/responses/401Unauthorized'
      security:
        - cookieAuth: []
      summary: Obtener el carrito actual
      tags:
        - Carts
  /carts/items:
    post:
