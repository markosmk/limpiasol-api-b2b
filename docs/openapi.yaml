          name: page
          schema:
            default: 1
            minimum: 1
            type: integer
        - in: query
          name: limit
          schema:
            default: 20
            maximum: 100
            minimum: 1
            type: integer
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/OrderStatus'
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  data:
                    properties:
                      hasMore:
                        type: boolean
                      orders:
                        items:
                          $ref: '#/components/schemas/Order'
                        type: array
                      total:
                        type: integer
                    type: object
                  success:
                    type: boolean
                type: object
          description: Lista de pedidos con paginación.
