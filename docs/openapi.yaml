        required: true
      responses:
        '200':
          description: Producto actualizado correctamente.
        '400':
          $ref: '#/components/responses/401Unauthorized'
      security:
        - cookieAuth: []
      summary: Actualizar producto (Sync parcial)
      tags:
        - Admin - Products
  /products/{productId}/price:
    post:
      description: >
        Calcula el precio unitario y total basado en el tier del usuario
        (retail/reseller),

        la cantidad solicitada y la variante elegida. Aplica descuentos por
        volumen y valida reglas de compra.
      operationId: calculateProductPrice
      parameters:
        - in: path
          name: productId
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                quantity:
                  description: Cantidad de unidades a comprar
                  minimum: 1
                  type: integer
                variantId:
                  description: ID de la variante específica (opcional)
                  type: string
              required:
                - quantity
              type: object
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  data:
                    properties:
                      pricing:
                        $ref: '#/components/schemas/PriceCalculationResult'
                      productId:
                        type: string
                      quantity:
                        type: integer
                      userTier:
                        enum:
                          - retail
                          - reseller
                        type: string
                      variantId:
                        nullable: true
                        type: string
                    type: object
                  success:
                    type: boolean
                type: object
          description: Cálculo de precio exitoso.
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Error de validación o reglas de compra incumplidas.
        '404':
          description: Producto o precio base no encontrado para el tier del usuario.
      summary: Calcular precio real
      tags:
        - Products
  /products/{productId}/prices:
    get:
      description: Lista todas las capas de precio (retail/reseller) y descuentos por
        volumen para un producto/variante.
      operationId: getProductPriceOptions
      parameters:
        - in: path
          name: productId
          required: true
          schema:
            type: string
        - in: query
          name: variantId
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  data:
                    properties:
                      options:
                        items:
                          $ref: '#/components/schemas/PriceTier'
                        type: array
                    type: object
                  success:
                    type: boolean
                type: object
          description: Lista de opciones de precio.
      summary: Ver todas las opciones de precio
      tags:
        - Products
  /products/{slug}:
    get:
      description: Retorna el detalle completo de un producto publicado buscando por
        su slug amigable.
      operationId: getProductBySlug
      parameters:
        - description: Slug único del producto.
          in: path
          name: slug
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  data:
                    properties:
                      pricing:
                        properties:
                          base:
                            $ref: '#/components/schemas/PriceTier'
                          note:
                            type: string
                        type: object
                      product:
                        $ref: '#/components/schemas/Product'
                    type: object
                  success:
                    type: boolean
                type: object
          description: Detalle del producto (público)
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Producto no encontrado.
      summary: Obtener producto por Slug
      tags:
        - Products
  /users:
    get:
      description: Obtiene una lista paginada de todos los usuarios del sistema.
        Permite filtrar por estado o rol.
      parameters:
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: role
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  data:
                    items:
                      properties:
                        email:
                          type: string
                        id:
                          type: string
                        name:
                          type: string
                        role:
                          type: string
                        status:
                          type: string
                      type: object
                    type: array
                  limit:
                    type: integer
                  page:
                    type: integer
                  total:
                    type: integer
                type: object
          description: Lista de usuarios
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Acceso denegado (requiere rol de administrador)
      security:
        - cookieAuth: []
      summary: Listar todos los usuarios
      tags:
        - Admin - Users
  /users/{id}:
    delete:
      description: Elimina (soft delete o permanente, según implementación) a un
        usuario del sistema. Un admin no puede eliminarse a sí mismo.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  message:
                    type: string
                  success:
                    type: boolean
                type: object
          description: Usuario eliminado correctamente
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/401Unauthorized'
      security:
        - cookieAuth: []
      summary: Eliminar usuario
      tags:
        - Admin - Users
    get:
      description: Devuelve la información completa de un usuario específico.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
          description: Detalles del usuario
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '404':
          $ref: '#/components/responses/Error'
      security:
        - cookieAuth: []
      summary: Obtener usuario por ID
      tags:
        - Admin - Users
  /users/{id}/role:
    patch:
      description: Permite a un administrador cambiar el rol de un usuario (ej.
        promover un cliente 'user' a 'reseller').
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                adminLevel:
                  description: Opcional. Nivel de acceso si el rol asignado es admin.
                  type: string
                role:
                  enum:
                    - user
                    - reseller
                    - admin
                  type: string
              required:
                - role
              type: object
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  message:
                    type: string
                  success:
                    type: boolean
                type: object
          description: Rol actualizado
        '400':
          $ref: '#/components/responses/Error'
      security:
        - cookieAuth: []
      summary: Actualizar rol de usuario
      tags:
        - Admin - Users
  /users/{id}/status:
    patch:
      description: Permite a un administrador cambiar el estado de un usuario (ej.
        activarlo, suspenderlo, rechazarlo).
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                reason:
                  description: Motivo de la suspensión o rechazo
                  type: string
                status:
                  enum:
                    - pending_approval
                    - active
                    - rejected
                    - suspended
                  type: string
              required:
                - status
              type: object
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  message:
                    type: string
                  success:
                    type: boolean
                type: object
          description: Estado actualizado
        '400':
          $ref: '#/components/responses/Error'
      security:
        - cookieAuth: []
      summary: Actualizar estado de usuario
      tags:
        - Admin - Users
